<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>刘瑞个人作品集</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header" aria-label="顶部导航">
      <a class="brand-mark" href="#home" aria-label="返回首页">
        <span class="brand-icon">◆</span>
        <span>Portfolio</span>
      </a>
      <nav class="top-nav" aria-label="作品分类导航">
        <a href="#profile">个人信息</a>
        <a href="#brand">品牌设计</a>
        <a href="#visual">活动视觉</a>
        <a href="#layout">版式设计</a>
        <a href="#ui">UI设计</a>
        <a href="#ai">AI设计</a>
      </nav>
    </header>

    <main>
      <section id="home" class="sheet-section">
        <img src="assets/images/reference-063.jpg" width="2526" height="1531" alt="刘瑞个人作品集首页" loading="eager">
      </section>

      <section id="catalog" class="sheet-section catalog-section">
        <div class="catalog-board">
          <img src="assets/images/reference-062.jpg" width="3512" height="2128" alt="作品集目录页" loading="lazy">
          <a class="catalog-hotspot hotspot-brand" href="#brand" aria-label="进入品牌设计"></a>
          <a class="catalog-hotspot hotspot-visual" href="#visual" aria-label="进入活动视觉"></a>
          <a class="catalog-hotspot hotspot-layout" href="#layout" aria-label="进入版式设计"></a>
          <a class="catalog-hotspot hotspot-ui" href="#ui" aria-label="进入UI设计"></a>
          <a class="catalog-hotspot hotspot-ai" href="#ai" aria-label="进入AI设计"></a>
        </div>
      </section>

      <section id="profile" class="sheet-section">
        <img src="assets/images/reference-061.jpg" width="2526" height="1531" alt="个人信息页" loading="lazy">
      </section>

      <div id="portfolio-root"></div>
    </main>

    <dialog class="lightbox" id="lightbox" aria-label="作品大图查看">
      <button class="lightbox-close" type="button" aria-label="关闭">×</button>
      <div class="lightbox-body">
        <img id="lightbox-image" alt="">
      </div>
      <p class="scroll-cue">上下滚动查看完整长图</p>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
